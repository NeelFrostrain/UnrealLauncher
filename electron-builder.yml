appId: com.unreallauncher.app
productName: Unreal Launcher
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!node_modules/*'
  - '!website/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - 'out/**'
  - 'native/dist/**'
  - 'resources/**'
asar: true
asarUnpack:
  - 'resources/**'
  - 'native/dist/**'
forceCodeSigning: false
compression: normal

win:
  executableName: unreallauncher
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: dir
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  warningsAsErrors: false

mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch: [x64, arm64]
dmg:
  artifactName: ${name}-${version}.${ext}
  window:
    width: 540
    height: 380

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  maintainer: NeelFrostrain
  category: Utility
  executableName: unreallauncher
  synopsis: Manage your Unreal Engine installations and projects
  description: A launcher for managing Unreal Engine installations and projects on Linux.
appImage:
  artifactName: ${name}-${version}.${ext}
deb:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false
publish:
  provider: github
  owner: NeelFrostrain
  repo: UnrealLauncher
